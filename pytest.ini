[pytest]
testpaths=tests
# Surface real DeprecationWarnings from upstream (transformers/torch/vllm) so
# CI catches breaking changes early. Silence only specific noisy warnings.
filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
    # pydantic-settings still uses the old class Config style internally.
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    # PIL frequently emits informational warnings about EXIF / palette.
    ignore::UserWarning:PIL
    # Bleach 6.x emits a DeprecationWarning about html5lib reliance — outside
    # our control until they ship 7.0.
    ignore:.*html5lib.*:DeprecationWarning
    # pypdfium2 / urllib3 deprecation chatter on certain platforms.
    ignore::DeprecationWarning:pypdfium2
    ignore::DeprecationWarning:urllib3